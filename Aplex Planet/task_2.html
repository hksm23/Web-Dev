<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact & ToDo App</title>
<link rel="stylesheet" href="task_2.css">
</head>

<body>

<div class="main-box">

<h1>My Web Application</h1>

<div class="grid-container">

<!-- Contact Form -->
<div class="box">
<h2>Contact Form</h2>

<form id="contactForm">

<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter your name" required>

<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter your email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.com$" title="Email must end with .com">>

<label for="message">Message</label>
<textarea id="message" placeholder="Write your message" required></textarea>

<button type="submit">Submit</button>

</form>
</div>

<!-- To Do List -->
<div class="box">
<h2>To Do List</h2>

<div class="todo-input">
<input type="text" id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add Task</button>
</div>

<ul id="taskList"></ul>

</div>

</div>

</div>

<script src="task_2.js"></script>

</body>
</html>
